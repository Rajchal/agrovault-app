name: Build and Release (EAS)

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Login to EAS
        run: eas login --token "${{ secrets.EAS_TOKEN }}"

      - name: Start EAS build (Android)
        run: eas build --platform android --non-interactive --profile production

      - name: Wait for finished build and download artifact
        run: |
          set -e
          # get last finished android build id
          BUILD_ID=$(eas build:list --platform android --status finished --limit 1 --json | jq -r '.[0].id')
          echo "Found build: $BUILD_ID"
          eas build:download --platform android --id "$BUILD_ID" --output build/

      - id: create_release
        name: Create GitHub release (tag)
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: build/*.{apk,aab}
          asset_name: agrovault.apk
          asset_content_type: application/vnd.android.package-archive
