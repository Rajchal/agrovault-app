name: Build and Release (EAS)

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Login to EAS
        run: eas login --token "${{ secrets.EAS_TOKEN }}"

      - name: Start EAS build (Android)
        run: eas build --platform android --non-interactive --profile production

      - name: Start EAS build (iOS)
        run: eas build --platform ios --non-interactive --profile production || true

      - name: Wait for finished Android build and download artifact
        run: |
          set -e
          echo "Waiting for Android build to finish..."
          BUILD_ID_ANDROID=$(eas build:list --platform android --status finished --limit 1 --json | jq -r '.[0].id')
          echo "Found Android build: $BUILD_ID_ANDROID"
          mkdir -p build/android
          eas build:download --platform android --id "$BUILD_ID_ANDROID" --output build/android/

      - name: Wait for finished iOS build and download artifact
        run: |
          set -e
          echo "Waiting for iOS build to finish..."
          BUILD_ID_IOS=$(eas build:list --platform ios --status finished --limit 1 --json | jq -r '.[0].id')
          echo "Found iOS build: $BUILD_ID_IOS"
          mkdir -p build/ios
          eas build:download --platform ios --id "$BUILD_ID_IOS" --output build/ios/ || echo "iOS download skipped or not available"

      - id: create_release
        name: Create GitHub release (tag)
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Android artifact to release
        if: always()
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: build/android/*.{apk,aab}
          asset_name: agrovault-android.apk
          asset_content_type: application/vnd.android.package-archive

      - name: Upload iOS artifact to release
        if: always()
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: build/ios/*.{ipa,aab}
          asset_name: agrovault-ios.ipa
          asset_content_type: application/octet-stream
